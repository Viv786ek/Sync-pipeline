# Render Blueprint — deploys the sync pipeline + a free PostgreSQL instance
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub
#   2. Go to render.com → New → Blueprint → connect your GitHub repo
#   3. Render auto-detects this file and provisions both services
#   4. In the web service → Environment, fill in the secret vars marked sync:false

databases:
  - name: sync-pipeline-db
    databaseName: sync_pipeline
    user: sync_user
    plan: free

services:
  - type: web
    name: sync-pipeline-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sync-pipeline-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: GOOGLE_CALENDAR_ID
        value: primary
      # ── Fill these in the Render dashboard (Environment tab) ──────────────
      - key: HUBSPOT_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false        # e.g. https://sync-pipeline-api.onrender.com/api/auth/google/callback
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
